<!DOCTYPE html>
<html>
<head>

<title>AI Text Similarity Detector</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: radial-gradient(circle,#1e3c72,#2a5298);
color:white;
}

.container{
width:650px;
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
}

.title{
font-size:28px;
margin-bottom:10px;
letter-spacing:1px;
}

.subtitle{
font-size:14px;
color:#ddd;
margin-bottom:25px;
}

textarea{
width:100%;
height:110px;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:none;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
}

textarea::placeholder{
color:#ddd;
}

button{
width:100%;
padding:12px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* RESULT BOX */

.result{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,0.1);
border-radius:8px;
}

.score{
font-size:22px;
margin-bottom:10px;
}

/* PROGRESS BAR */

.progress-bar{
height:10px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.progress{
height:10px;
background:#00e5ff;
width:{{percentage}}%;
}

/* LOADER */

.loader{
display:none;
margin-top:20px;
}

.spinner{
border:5px solid rgba(255,255,255,0.2);
border-top:5px solid #00e5ff;
border-radius:50%;
width:40px;
height:40px;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.loading-text{
margin-top:10px;
font-size:14px;
color:#ddd;
}

.dataset{
margin-top:10px;
font-size:16px;
color:#ddd;
}

</style>

<script>

function showLoader(){
document.getElementById("loader").style.display="block";
}

</script>

</head>

<body>

<div class="container">

<div class="title">
AI TEXT SIMILARITY
</div>

<div class="subtitle">
NLP Based Similarity Detection
</div>

<form method="POST" onsubmit="showLoader()">

<textarea name="text1" placeholder="Enter first text"></textarea>

<textarea name="text2" placeholder="Enter second text"></textarea>

<button type="submit">Analyze Similarity</button>

</form>

<!-- LOADER -->

<div id="loader" class="loader">

<div class="spinner"></div>

<div class="loading-text">
Analyzing text using AI...
</div>

</div>

{% if percentage is not none %}

<div class="result">

<div class="score">
Similarity Score: {{percentage}}%
</div>

<div class="progress-bar">
<div class="progress"></div>
</div>

</div>

{% endif %}

{% if dataset_score is not none %}

<div class="result">

<div class="dataset">
Dataset Similarity: {{dataset_score}}%
</div>

</div>

{% endif %}

</div>

</body>
</html>
